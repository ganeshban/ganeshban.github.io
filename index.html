<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0e0e0e;
      --paper: #f5f0e8;
      --cream: #ede7d5;
      --muted: #7a7265;
      --accent: #b5451b;
      --accent2: #1b6ab5;
      --line: rgba(14,14,14,0.12);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-mono: 'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-mono);
      background-color: var(--paper);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* Loading */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: var(--ink);
      color: var(--paper);
      display: flex;
      flex-direction: column;
      padding: 48px 32px;
      border-right: 1px solid var(--ink);
      overflow: hidden;
    }

    .sidebar::after {
      content: '';
      position: absolute;
      bottom: -80px;
      right: -80px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.08;
    }

    .avatar-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(245,240,232,0.2);
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: var(--cream);
    }

    .sidebar-name {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 300;
      line-height: 1.2;
      color: var(--paper);
      margin-bottom: 6px;
    }

    .sidebar-title {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.45);
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .sidebar-location {
      font-size: 10px;
      color: rgba(245,240,232,0.35);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .available-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 4px 10px;
      border-radius: 2px;
      margin-bottom: 32px;
      color: #7dd3a8;
    }

    .available-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7dd3a8;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .sidebar-divider {
      height: 1px;
      background: rgba(245,240,232,0.1);
      margin-bottom: 28px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .nav a {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.45);
      text-decoration: none;
      padding: 6px 0;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav a::before {
      content: '';
      width: 16px;
      height: 1px;
      background: currentColor;
      flex-shrink: 0;
      transition: width 0.2s;
    }

    .nav a:hover { color: var(--paper); }
    .nav a:hover::before { width: 28px; }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: auto;
      padding-top: 32px;
    }

    .contact-link {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(245,240,232,0.4);
      text-decoration: none;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .contact-link:hover { color: var(--paper); }

    /* Main content */
    .main {
      padding: 80px 64px;
      max-width: 860px;
    }

    /* Section */
    .section {
      margin-bottom: 80px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.6s forwards;
    }

    .section:nth-child(1) { animation-delay: 0.1s; }
    .section:nth-child(2) { animation-delay: 0.2s; }
    .section:nth-child(3) { animation-delay: 0.3s; }
    .section:nth-child(4) { animation-delay: 0.4s; }
    .section:nth-child(5) { animation-delay: 0.5s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    /* About */
    .bio-text {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 300;
      line-height: 1.6;
      color: var(--ink);
      max-width: 600px;
    }

    /* Experience */
    .exp-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .exp-item {
      display: grid;
      grid-template-columns: 1fr;
      padding: 28px 0;
      border-bottom: 1px solid var(--line);
      position: relative;
    }

    .exp-item:first-child { border-top: 1px solid var(--line); }

    .exp-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .exp-company {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 400;
      color: var(--ink);
    }

    .exp-period {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      white-space: nowrap;
    }

    .exp-role {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .exp-desc {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 14px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid var(--line);
      color: var(--muted);
      border-radius: 1px;
    }

    /* Projects */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
    }

    .project-card {
      background: var(--paper);
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .project-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.3s ease;
    }

    .project-card:hover { background: var(--cream); }
    .project-card:hover::before { transform: scaleY(1); }

    .project-name {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 400;
    }

    .project-desc {
      font-size: 12px;
      color: var(--muted);
      flex: 1;
    }

    .project-arrow {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
    }

    /* Interests */
    .interests-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .interest-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--cream);
      border: 1px solid var(--line);
      font-size: 12px;
      border-radius: 2px;
      transition: background 0.2s;
    }

    .interest-item:hover { background: var(--ink); color: var(--paper); }

    .interest-emoji {
      font-size: 16px;
      line-height: 1;
    }

    /* Contact */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
    }

    .contact-card {
      background: var(--paper);
      padding: 24px;
      text-decoration: none;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: background 0.2s;
    }

    .contact-card:hover { background: var(--ink); color: var(--paper); }

    .contact-type {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .contact-card:hover .contact-type { color: rgba(245,240,232,0.5); }

    .contact-value {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 300;
      word-break: break-all;
    }

    /* Footer */
    .footer {
      margin-top: 40px;
      padding-top: 32px;
      border-top: 1px solid var(--line);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        padding: 40px 24px;
      }
      .nav { flex-direction: row; flex-wrap: wrap; }
      .contact-links { flex-direction: row; flex-wrap: wrap; padding-top: 24px; }
      .main { padding: 48px 24px; }
      .projects-grid { grid-template-columns: 1fr; }
      .contact-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="loading">Loading portfolio…</div>
  <div id="root" style="display:none"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function Portfolio({ data }) {
      const { name, title, bio, avatar, location, available, experience, projects, interests, contact } = data;

      const contactEntries = Object.entries(contact || {}).filter(([, v]) => v);

      const getLinkLabel = (key, value) => {
        if (key === 'email') return value;
        try { return new URL(value).hostname.replace('www.', ''); } catch { return value; }
      };

      return (
        <div className="layout">
          {/* Sidebar */}
          <aside className="sidebar">
            {avatar && (
              <div className="avatar-wrap">
                <img src={avatar} alt={name} onError={e => e.target.style.display='none'} />
              </div>
            )}
            <div className="sidebar-name">{name}</div>
            <div className="sidebar-title">{title}</div>
            {location && <div className="sidebar-location">⌖ {location}</div>}
            {available && (
              <div className="available-badge">
                <span className="available-dot"></span>
                Available for work
              </div>
            )}
            <div className="sidebar-divider"></div>
            <nav className="nav">
              <a href="#about">About</a>
              <a href="#experience">Experience</a>
              <a href="#projects">Projects</a>
              <a href="#interests">Interests</a>
              <a href="#contact">Contact</a>
            </nav>
            <div className="contact-links">
              {contactEntries.map(([key, value]) => (
                <a key={key}
                   href={key === 'email' ? `mailto:${value}` : value}
                   target="_blank"
                   rel="noopener noreferrer"
                   className="contact-link">
                  ↗ {key.charAt(0).toUpperCase() + key.slice(1)}
                </a>
              ))}
            </div>
          </aside>

          {/* Main */}
          <main className="main">

            {/* About */}
            <section className="section" id="about">
              <div className="section-label">About</div>
              <p className="bio-text">{bio}</p>
            </section>

            {/* Experience */}
            {experience?.length > 0 && (
              <section className="section" id="experience">
                <div className="section-label">Experience</div>
                <div className="exp-list">
                  {experience.map((e, i) => (
                    <div className="exp-item" key={i}>
                      <div className="exp-header">
                        <span className="exp-company">{e.company}</span>
                        <span className="exp-period">{e.period}</span>
                      </div>
                      <div className="exp-role">{e.role}</div>
                      {e.description && <p className="exp-desc">{e.description}</p>}
                      {e.tags?.length > 0 && (
                        <div className="tag-list">
                          {e.tags.map(t => <span className="tag" key={t}>{t}</span>)}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </section>
            )}

            {/* Projects */}
            {projects?.length > 0 && (
              <section className="section" id="projects">
                <div className="section-label">Projects</div>
                <div className="projects-grid">
                  {projects.map((p, i) => (
                    <a href={p.url || '#'} target="_blank" rel="noopener noreferrer"
                       className="project-card" key={i}>
                      <div className="project-name">{p.name}</div>
                      {p.description && <p className="project-desc">{p.description}</p>}
                      {p.tags?.length > 0 && (
                        <div className="tag-list">
                          {p.tags.map(t => <span className="tag" key={t}>{t}</span>)}
                        </div>
                      )}
                      <div className="project-arrow">View project →</div>
                    </a>
                  ))}
                </div>
              </section>
            )}

            {/* Interests */}
            {interests?.length > 0 && (
              <section className="section" id="interests">
                <div className="section-label">Interests</div>
                <div className="interests-grid">
                  {interests.map((item, i) => (
                    <div className="interest-item" key={i}>
                      <span className="interest-emoji">{item.icon}</span>
                      <span>{item.label}</span>
                    </div>
                  ))}
                </div>
              </section>
            )}

            {/* Contact */}
            {contactEntries.length > 0 && (
              <section className="section" id="contact">
                <div className="section-label">Contact</div>
                <div className="contact-grid">
                  {contactEntries.map(([key, value]) => (
                    <a key={key}
                       href={key === 'email' ? `mailto:${value}` : value}
                       target="_blank" rel="noopener noreferrer"
                       className="contact-card">
                      <div className="contact-type">{key}</div>
                      <div className="contact-value">{getLinkLabel(key, value)}</div>
                    </a>
                  ))}
                </div>
              </section>
            )}

            <footer className="footer">
              <span>© {new Date().getFullYear()} {name}</span>
              <span>Built with portfolio.json</span>
            </footer>
          </main>
        </div>
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch('.portfolio.json')
          .then(r => {
            if (!r.ok) throw new Error(`Could not load portfolio.json (${r.status})`);
            return r.json();
          })
          .then(json => {
            setData(json);
            document.title = json.name ? `${json.name} — Portfolio` : 'Portfolio';
          })
          .catch(err => setError(err.message));
      }, []);

      useEffect(() => {
        if (data || error) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('root').style.display = 'block';
        }
      }, [data, error]);

      if (error) return (
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16,fontFamily:'DM Mono,monospace',textAlign:'center',padding:24}}>
          <div style={{fontSize:32}}>⚠️</div>
          <div style={{fontSize:13,color:'#b5451b',letterSpacing:'0.05em'}}>{error}</div>
          <div style={{fontSize:11,color:'#7a7265',maxWidth:400}}>
            Make sure <code style={{background:'#ede7d5',padding:'2px 6px'}}>portfolio.json</code> is in the same folder as <code style={{background:'#ede7d5',padding:'2px 6px'}}>index.html</code>
          </div>
        </div>
      );

      if (!data) return null;
      return <Portfolio data={data} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
